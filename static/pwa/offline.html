<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabrix Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #fafaf8 0%, #f5f6f8 100%);
            color: #0f172a;
            font-family: Outfit, system-ui, sans-serif;
        }
        .card {
            width: min(90vw, 420px);
            padding: 2rem;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid #e2e8f0;
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin: 0 0 0.75rem;
            font-size: 1.8rem;
        }
        p {
            margin: 0;
            color: #475569;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Fabrix is offline</h1>
        <p>Your install is working, but the shared shop data needs a live connection to sync inventory, billing, and dashboard updates. Reconnect to continue.</p>
    </div>
</body>
</html>
